<!DOCTYPE html>
<html lang="en">

<!-- ============================================================
     BASE82 — EXPLORE.HTML
     Game database search & filter
============================================================ -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="BASE82 Explore — search and browse 500,000+ games. Filter by trending, top rated, newest, or alphabetically.">
    <meta name="keywords" content="BASE82, explore games, game database, game search, top rated games">
    <meta property="og:title" content="BASE82 — Explore">
    <meta property="og:description" content="Search and explore 500,000+ games on BASE82.">

    <title>Explore — BASE82</title>

    <link rel="icon" type="image/png" href="../asserts/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../CSS/pages.css">
    <link rel="stylesheet" href="../CSS/explore.css">
    <link rel="stylesheet" href="../CSS/theme-switcher.css">
</head>

<body>

    <!-- ============================================================
         NAVIGATION
    ============================================================ -->
    <header class="top-nav" role="banner">
        <a href="home.html" class="nav-brand" aria-label="BASE82 home">
            <img src="../asserts/logo.png" alt="BASE82" width="32" height="32">
            <span>BASE82</span>
        </a>
        <nav aria-label="Main navigation">
            <ul class="nav-links">
                <li><a href="home.html">HOME</a></li>
                <li><a href="explore.html" class="active" aria-current="page">EXPLORE</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
                <li><a href="faq.html">FAQ</a></li>
            </ul>
        </nav>
    </header>

    <!-- ============================================================
         MAIN
    ============================================================ -->
    <main class="page-wrapper">

        <!-- Page header -->
        <p class="page-eyebrow">TARGET ACQUISITION</p>
        <h1 class="page-title">EXPLORE<br><span class="accent">THE DATABASE</span></h1>

        <!-- Search bar -->
        <section aria-label="Game search" class="search-bar-wrapper">
            <div class="search-bar" role="search">
                <i class="fas fa-search search-icon" aria-hidden="true"></i>
                <label for="searchInput" class="visually-hidden">Search games</label>
                <input type="search" id="searchInput" placeholder="Search games..." autocomplete="off"
                    aria-label="Search games">
                <button class="search-clear" id="clearBtn" aria-label="Clear search" type="button">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            </div>
        </section>

        <!-- Filter chips -->
        <div class="filter-bar" role="toolbar" aria-label="Sort games by">
            <button class="filter-chip active" data-order="-added" type="button" aria-pressed="true">TRENDING</button>
            <button class="filter-chip" data-order="-rating" type="button" aria-pressed="false">TOP RATED</button>
            <button class="filter-chip" data-order="-released" type="button" aria-pressed="false">NEWEST</button>
            <button class="filter-chip" data-order="name" type="button" aria-pressed="false">A–Z</button>
        </div>

        <!-- Results count -->
        <p class="results-count" id="resultsCount" aria-live="polite">LOADING TARGETS...</p>

        <!-- Games grid -->
        <div class="explore-grid" id="exploreGrid" role="list" aria-label="Game results"></div>

        <!-- Load more -->
        <button class="load-more-btn" id="loadMoreBtn" type="button" style="display:none" aria-label="Load more games">
            LOAD MORE TARGETS
        </button>

    </main>

    <!-- ============================================================
         FOOTER
    ============================================================ -->
    <footer
        style="text-align:center; padding:24px 40px 40px; border-top:1px solid rgba(255,255,255,0.05); position:relative; z-index:1;">
        <nav aria-label="Footer navigation">
            <ul style="list-style:none; display:flex; gap:24px; justify-content:center; flex-wrap:wrap;">
                <li><a href="home.html"
                        style="color:var(--text-muted); text-decoration:none; font-family:'PixelDigivolve',monospace; font-size:9px; letter-spacing:2px;">HOME</a>
                </li>
                <li><a href="about.html"
                        style="color:var(--text-muted); text-decoration:none; font-family:'PixelDigivolve',monospace; font-size:9px; letter-spacing:2px;">ABOUT</a>
                </li>
                <li><a href="contact.html"
                        style="color:var(--text-muted); text-decoration:none; font-family:'PixelDigivolve',monospace; font-size:9px; letter-spacing:2px;">CONTACT</a>
                </li>
                <li><a href="faq.html"
                        style="color:var(--text-muted); text-decoration:none; font-family:'PixelDigivolve',monospace; font-size:9px; letter-spacing:2px;">FAQ</a>
                </li>
            </ul>
        </nav>
    </footer>

    <!-- Toast -->
    <div id="customToast" class="custom-toast" role="status" aria-live="polite">
        <span id="toastMessage"></span>
    </div>

    <!-- Scripts -->
    <script src="../JS/explore.js"></script>
    <script src="../JS/theme-switcher.js"></script>

</body>

</html>
